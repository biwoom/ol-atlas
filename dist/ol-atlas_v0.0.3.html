/* styles/tokens.css */
/* ══════════════════════════════════════════
   shadcn/ui DESIGN TOKENS (Phase 1)
   HSL 변수 시스템 - 라이트/다크 모드 지원
══════════════════════════════════════════ */
:root {
  --background:           0 0% 100%;
  --foreground:           0 0% 3.9%;
  --card:                 0 0% 100%;
  --card-foreground:      0 0% 3.9%;
  --popover:              0 0% 100%;
  --popover-foreground:   0 0% 3.9%;
  --primary:              0 0% 9%;
  --primary-foreground:   0 0% 98%;
  --secondary:            0 0% 96.1%;
  --secondary-foreground: 0 0% 9%;
  --muted:                0 0% 96.1%;
  --muted-foreground:     0 0% 45.1%;
  --accent:               0 0% 96.1%;
  --accent-foreground:    0 0% 9%;
  --destructive:          0 84.2% 60.2%;
  --destructive-foreground: 0 0% 98%;
  --border:               0 0% 89.8%;
  --input:                0 0% 89.8%;
  --ring:                 0 0% 3.9%;

  /* 시맨틱 컬러 (변경이력, 우선순위, 학습상태용) */
  --success:              142 71% 45%;
  --warning:              38 92% 50%;
  --info:                 217 91% 60%;

  --radius: 0.5rem;

  /* 레이아웃 */
  --header-h:  56px;
  --sidebar-w: 256px;
}

/* iOS Safari :root 특이성 충돌 방지:
   :root = (0,1,0), .dark = (0,1,0) → 동일 특이성에서 iOS Safari가 :root 우선시하는 버그
   html.dark = (0,1,1) → :root보다 특이성 높아 확실히 덮어씀 */
html.dark,
:root.dark {
  --background:           0 0% 3.9%;
  --foreground:           0 0% 98%;
  --card:                 0 0% 3.9%;
  --card-foreground:      0 0% 98%;
  --popover:              0 0% 3.9%;
  --popover-foreground:   0 0% 98%;
  --primary:              0 0% 98%;
  --primary-foreground:   0 0% 9%;
  --secondary:            0 0% 14.9%;
  --secondary-foreground: 0 0% 98%;
  --muted:                0 0% 14.9%;
  --muted-foreground:     0 0% 63.9%;
  --accent:               0 0% 14.9%;
  --accent-foreground:    0 0% 98%;
  --destructive:          0 62.8% 30.6%;
  --destructive-foreground: 0 0% 98%;
  --border:               0 0% 14.9%;
  --input:                0 0% 14.9%;
  --ring:                 0 0% 83.1%;

  --success:              142 71% 45%;
  --warning:              38 92% 50%;
  --info:                 217 91% 60%;
}


/* styles/base.css */
/* ══════════════════════════════════════════
   BASE
══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
* { border-color: hsl(var(--border)); }

html {
  font-size: 16px;
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
  background: hsl(var(--background));
}
/* iOS Safari CSS 변수 재계산 버그 대응:
   hsl(var(--background)) 변경 시 재렌더가 안 되는 경우를 위해
   html.dark / body 배경·텍스트 색을 직접 명시 */
html.dark { background: hsl(0 0% 3.9%); }
html.dark body {
  background: hsl(0 0% 3.9%);
  color: hsl(0 0% 98%);
}
body {
  font-family:
    -apple-system, BlinkMacSystemFont,
    "Pretendard Variable", "Pretendard",
    "Apple SD Gothic Neo", "Noto Sans KR",
    "Segoe UI", Roboto, Helvetica, Arial, sans-serif,
    "Apple Color Emoji", "Segoe UI Emoji";
  background: hsl(var(--background));
  color: hsl(var(--foreground));
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "rlig" 1, "calt" 1;
  font-size: 0.875rem; /* 14px — 기본 본문 크기 */
  line-height: 1.5;
}
a { color: inherit; text-decoration: none; }
a:hover { text-decoration: underline; text-underline-offset: 4px; }
button { cursor: pointer; font-family: inherit; }
input, textarea, select { font-family: inherit; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: hsl(var(--border)); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: hsl(var(--muted-foreground) / 0.4); }
::-webkit-scrollbar-track { background: transparent; }

/* kbd 기본 reset (브라우저 기본 monospace/작은 글자 무력화 — 우리 클래스가 통제) */
kbd {
  font: inherit;
  line-height: 1;
}


/* styles/components.css */
/* ══════════════════════════════════════════
   shadcn 핵심 컴포넌트 — Phase 1
══════════════════════════════════════════ */

/* ── Button ─────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 0.5rem;
  white-space: nowrap;
  border-radius: calc(var(--radius) - 2px);
  font-size: 0.875rem;
  font-weight: 500;
  height: 2.25rem; /* h-9 */
  padding: 0 1rem;
  border: 1px solid transparent;
  background: transparent;
  color: hsl(var(--foreground));
  transition: background-color .15s, color .15s, border-color .15s, box-shadow .15s, transform .08s;
  outline: none;
  cursor: pointer;
}
.btn:focus-visible {
  outline: 2px solid hsl(var(--ring));
  outline-offset: 2px;
}
.btn:disabled { opacity: 0.5; pointer-events: none; }
.btn:not(:disabled):active {
  transform: scale(0.98);
}

.btn svg { width: 1rem; height: 1rem; flex-shrink: 0; }

/* variants */
.btn.pri {
  background: hsl(var(--primary));
  color: hsl(var(--primary-foreground));
}
.btn.pri:hover { background: hsl(var(--primary) / 0.9); }

.btn:not(.pri):not(.danger) {
  border: 1px solid hsl(var(--border));
  background: hsl(var(--background));
}
.btn:not(.pri):not(.danger):hover {
  background: hsl(var(--accent));
  color: hsl(var(--accent-foreground));
}

.btn.danger {
  background: hsl(var(--destructive));
  color: hsl(var(--destructive-foreground));
  border: 1px solid transparent;
}
.btn.danger:hover { background: hsl(var(--destructive) / 0.9); }

/* sizes */
.btn.sm { height: 2rem; padding: 0 0.75rem; font-size: 0.8125rem; border-radius: calc(var(--radius) - 4px); }

/* ── Input ──────────────────────────────── */
.input,
.field input,
.field textarea,
.field select {
  display: flex;
  height: 2.25rem;
  width: 100%;
  border-radius: calc(var(--radius) - 2px);
  border: 1px solid hsl(var(--input));
  background: hsl(var(--background));
  padding: 0 0.75rem;
  font-size: 0.875rem;
  color: hsl(var(--foreground));
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.input::placeholder,
.field input::placeholder,
.field textarea::placeholder {
  color: hsl(var(--muted-foreground));
}
.input:focus-visible,
.field input:focus-visible,
.field textarea:focus-visible,
.field select:focus-visible,
.input:focus,
.field input:focus,
.field textarea:focus,
.field select:focus {
  border-color: hsl(var(--ring));
  box-shadow: 0 0 0 3px hsl(var(--ring) / 0.15);
}
.field textarea {
  height: auto;
  min-height: 5rem;
  padding: 0.5rem 0.75rem;
  line-height: 1.6;
  resize: vertical;
}
.field select {
  cursor: pointer;
  appearance: none;
  background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23888' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpath d='m6 9 6 6 6-6'/%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 0.5rem center;
  padding-right: 2rem;
}
/* 에러 상태 (검증 실패) */
.field input.error,
.field textarea.error,
.field select.error {
  border-color: hsl(var(--destructive));
}
.field input.error:focus,
.field textarea.error:focus,
.field select.error:focus {
  box-shadow: 0 0 0 3px hsl(var(--destructive) / 0.15);
}

/* ── Card ──────────────────────────────── */
.card {
  border-radius: var(--radius);
  border: 1px solid hsl(var(--border));
  background: hsl(var(--card));
  color: hsl(var(--card-foreground));
  box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
}

/* ── Badge ─────────────────────────────── */
.badge {
  display: inline-flex; align-items: center;
  border-radius: 9999px;
  border: 1px solid transparent;
  padding: 0.125rem 0.5rem;
  font-size: 0.625rem;          /* 10px — 16base에서 뱃지는 작게 유지 */
  font-weight: 500;
  line-height: 1.5;
  white-space: nowrap;
  transition: background-color .15s;
}
.badge.wait {
  background: hsl(var(--muted));
  color: hsl(var(--muted-foreground));
}
.badge.doing {
  background: hsl(var(--warning) / 0.15);
  color: hsl(38 92% 35%);
}
.dark .badge.doing { color: hsl(38 92% 60%); }
.badge.done {
  background: hsl(var(--success) / 0.15);
  color: hsl(142 71% 30%);
}
.dark .badge.done { color: hsl(142 71% 55%); }

/* ── Tag ───────────────────────────────── */
.tag {
  display: inline-flex; align-items: center;
  border-radius: calc(var(--radius) - 4px);
  border: 1px solid hsl(var(--border));
  background: hsl(var(--secondary));
  color: hsl(var(--secondary-foreground));
  padding: 0.0625rem 0.4375rem;
  font-size: 0.625rem;          /* 10px — 16base에서 태그는 작게 유지 */
  font-weight: 500;
  line-height: 1.5;
  white-space: nowrap;
}

/* ── Icon ──────────────────────────────── */
.icon {
  width: 1rem;
  height: 1rem;
  flex-shrink: 0;
  stroke-width: 2;
}

/* ══════════════════════════════════════════
   HEADER (Phase 1 - shadcn 스타일)
══════════════════════════════════════════ */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  height: var(--header-h);
  background: hsl(var(--background));
  border-bottom: 1px solid hsl(var(--border));
  display: flex; align-items: center;
  padding: 0 1rem;
  gap: 1rem;
}

.h-brand {
  display: flex; align-items: center; gap: 0.5rem;
  padding-right: 1rem;
  border-right: 1px solid hsl(var(--border));
  height: 100%;
  cursor: pointer;
  min-width: calc(var(--sidebar-w) - 1rem);
}
.h-brand-mark {
  font-size: 1rem; font-weight: 600;
  color: hsl(var(--foreground));
  letter-spacing: -0.025em;
  line-height: 1;
  display: flex; align-items: center; gap: 0.5rem;
}
.h-brand-mark em {
  font-style: normal;
  background: hsl(var(--primary));
  color: hsl(var(--primary-foreground));
  width: 1.5rem; height: 1.5rem;
  border-radius: calc(var(--radius) - 2px);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 700;
}
.h-brand-mark-info{opacity: 0.6}
.h-brand-sub {
  font-size: 0.625rem;           /* 10px */
  color: hsl(var(--muted-foreground));
  line-height: 1.3;
  font-weight: 400;
}

.h-nav {
  display: flex; align-items: center; gap: 0.25rem;
  flex: 1;
}
.h-nav-btn {
  display: inline-flex; align-items: center; gap: 0.375rem;
  height: 2rem; padding: 0 0.75rem;
  font-size: 0.8125rem; font-weight: 500;
  border: none; background: transparent;
  color: hsl(var(--muted-foreground));
  border-radius: calc(var(--radius) - 2px);
  transition: background-color .15s, color .15s;
  white-space: nowrap; outline: none;
}
.h-nav-btn:hover {
  background: hsl(var(--accent));
  color: hsl(var(--accent-foreground));
}
.h-nav-btn:focus-visible {
  outline: 2px solid hsl(var(--ring));
  outline-offset: 2px;
}
.h-nav-btn.active {
  background: hsl(var(--secondary));
  color: hsl(var(--secondary-foreground));
}

.h-right {
  display: flex; align-items: center; gap: 0.5rem;
}

/* ── 헤더 드롭다운 메뉴 (저장 / 파일열기) ── */
.h-dropdown { position: relative; display: inline-flex; }
.h-dropdown-trigger {
  display: inline-flex; align-items: center; gap: 0.25rem;
  height: 2rem; padding: 0 0.625rem 0 0.75rem;
  font-size: 0.8125rem; font-weight: 500;
  border: 1px solid hsl(var(--border));
  background: hsl(var(--background));
  color: hsl(var(--foreground));
  border-radius: calc(var(--radius) - 2px);
  transition: background-color .15s, color .15s;
  white-space: nowrap; outline: none; cursor: pointer;
}
.h-dropdown-trigger:hover {
  background: hsl(var(--accent));
  color: hsl(var(--accent-foreground));
}
.h-dropdown-trigger:focus-visible {
  outline: 2px solid hsl(var(--ring));
  outline-offset: 2px;
}
.h-dropdown-trigger .icon { width: 0.875rem; height: 0.875rem; }
.h-dropdown-trigger .chevron {
  width: 0.75rem; height: 0.75rem;
  opacity: 0.6;
  transition: transform .15s;
  flex-shrink: 0;
}
.h-dropdown.open .h-dropdown-trigger .chevron { transform: rotate(180deg); }
.h-dropdown-trigger.active,
.h-dropdown.open .h-dropdown-trigger {
  background: hsl(var(--accent));
  color: hsl(var(--accent-foreground));
}

.h-dropdown-menu {
  display: none;
  position: absolute;
  top: calc(100% + 0.375rem);
  right: 0;
  min-width: 13rem;
  background: hsl(var(--popover));
  color: hsl(var(--popover-foreground));
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  box-shadow: 0 10px 38px -10px rgb(0 0 0 / 0.25),
              0 4px 12px -4px rgb(0 0 0 / 0.12);
  z-index: 110;
  padding: 0.25rem;
  animation: pop-in .12s ease;
}
.h-dropdown.open .h-dropdown-menu { display: block; }

.h-dropdown-item {
  display: flex; align-items: center; gap: 0.5rem;
  width: 100%; padding: 0.4375rem 0.625rem;
  font-size: 0.8125rem; font-weight: 400;
  border-radius: calc(var(--radius) - 4px);
  background: none; border: none; outline: none;
  color: hsl(var(--foreground));
  cursor: pointer; text-align: left;
  transition: background-color .12s, color .12s;
  white-space: nowrap;
}
.h-dropdown-item:hover,
.h-dropdown-item:focus-visible {
  background: hsl(var(--accent));
  color: hsl(var(--accent-foreground));
}
.h-dropdown-item .icon { width: 0.875rem; height: 0.875rem; flex-shrink: 0; opacity: 0.7; }

/* 모바일 사이드바 — 드롭다운 변형 */
.sb-mp-dropdown { position: relative; flex: 1; }
.sb-mp-dropdown-trigger {
  display: flex; align-items: center; justify-content: center; gap: 0.375rem;
  width: 100%;
  padding: 0.5rem 0.75rem;
  font-size: 0.8125rem; font-weight: 500;
  border: 1px solid hsl(var(--border));
  background: hsl(var(--background));
  color: hsl(var(--foreground));
  border-radius: calc(var(--radius) - 2px);
  cursor: pointer; outline: none;
  transition: background-color .15s;
}
.sb-mp-dropdown-trigger:hover { background: hsl(var(--accent)); }
.sb-mp-dropdown-trigger .icon { width: 0.875rem; height: 0.875rem; }
.sb-mp-dropdown-trigger .chevron { width: 0.75rem; height: 0.75rem; opacity: 0.6; transition: transform .15s; }
.sb-mp-dropdown.open .sb-mp-dropdown-trigger .chevron { transform: rotate(180deg); }
.sb-mp-dropdown-menu {
  display: none;
  position: absolute;
  top: calc(100% + 0.25rem);
  left: 0;
  /* 두 배 너비: 버튼(flex:1) × 2 = 사이드바 액션 영역 전체 폭에 근접 */
  min-width: 200%;
  /* 사이드바 padding 내에서만 노출되도록 우측 제한 */
  max-width: calc(var(--sidebar-w) - 2rem);
  background: hsl(var(--popover));
  color: hsl(var(--popover-foreground));
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  box-shadow: 0 8px 24px -4px rgb(0 0 0 / 0.18);
  z-index: 200;
  padding: 0.25rem;
  animation: pop-in .12s ease;
}
.sb-mp-dropdown.open .sb-mp-dropdown-menu { display: block; }
/* 두 번째 드롭다운(열기)은 오른쪽 정렬 — 사이드바 우측 초과 방지 */
#sb-open-dropdown .sb-mp-dropdown-menu {
  left: auto;
  right: 0;
}
.sb-mp-dropdown-item {
  display: flex; align-items: center; gap: 0.5rem;
  width: 100%; padding: 0.5rem 0.625rem;
  font-size: 0.8125rem;
  border-radius: calc(var(--radius) - 4px);
  background: none; border: none; outline: none;
  color: hsl(var(--foreground));
  cursor: pointer; text-align: left;
  transition: background-color .12s;
}
.sb-mp-dropdown-item:hover { background: hsl(var(--accent)); }
.sb-mp-dropdown-item .icon { width: 0.875rem; height: 0.875rem; flex-shrink: 0; opacity: 0.7; }

/* 다크모드 토글 버튼 */
.theme-toggle {
  display: inline-flex; align-items: center; justify-content: center;
  width: 2rem; height: 2rem;
  border: 1px solid hsl(var(--border));
  background: hsl(var(--background));
  color: hsl(var(--foreground));
  border-radius: calc(var(--radius) - 2px);
  cursor: pointer;
  transition: background-color .15s;
  outline: none;
}
.theme-toggle:hover { background: hsl(var(--accent)); }
.theme-toggle:focus-visible {
  outline: 2px solid hsl(var(--ring));
  outline-offset: 2px;
}
.theme-toggle .icon-sun { display: block; }
.theme-toggle .icon-moon { display: none; }
.dark .theme-toggle .icon-sun { display: none; }
.dark .theme-toggle .icon-moon { display: block; }

/* 사용자 아바타 - shadcn Avatar 컴포넌트 */


/* styles/sidebar.css */
/* ══════════════════════════════════════════
   HEADER SEARCH (shadcn Command 팔레트 스타일)
══════════════════════════════════════════ */
.h-search-wrap {
  position: relative;
  display: flex; align-items: center;
}
.h-search-input {
  display: flex; align-items: center;
  height: 2rem;
  padding: 0 0.75rem;
  padding-left: 2rem;
  padding-right: 2.5rem;
  font-size: 0.8125rem;
  background: hsl(var(--background));
  border: 1px solid hsl(var(--border));
  border-radius: calc(var(--radius) - 2px);
  color: hsl(var(--foreground));
  width: 240px; outline: none;
  transition: width .2s, border-color .15s, box-shadow .15s;
}
.h-search-input::placeholder {
  color: hsl(var(--muted-foreground));
}
.h-search-input:focus {
  width: 320px;
  border-color: hsl(var(--ring));
  box-shadow: 0 0 0 3px hsl(var(--ring) / 0.15);
}
.h-search-icon {
  position: absolute; left: 0.625rem; top: 50%;
  transform: translateY(-50%);
  color: hsl(var(--muted-foreground));
  pointer-events: none;
  display: flex;
}
.h-search-icon svg { width: 0.875rem; height: 0.875rem; }
.h-search-clear {
  position: absolute; right: 0.375rem; top: 50%;
  transform: translateY(-50%);
  width: 1.25rem; height: 1.25rem;
  display: none; align-items: center; justify-content: center;
  color: hsl(var(--muted-foreground));
  background: transparent; border: none; cursor: pointer;
  border-radius: calc(var(--radius) - 4px);
  transition: background-color .1s, color .1s;
}
.h-search-clear:hover {
  background: hsl(var(--accent));
  color: hsl(var(--accent-foreground));
}
.h-search-clear svg { width: 0.75rem; height: 0.75rem; }

/* Cmd+K 힌트 (검색 input 안 우측, focus 또는 입력 시 숨김) */
.h-search-kbd {
  position: absolute;
  right: 0.4375rem;
  top: 50%;
  transform: translateY(-50%);
  display: inline-flex;
  align-items: center;
  gap: 0.125rem;
  padding: 0 0.375rem;
  height: 1.125rem;
  background: hsl(var(--muted));
  border: 1px solid hsl(var(--border));
  border-radius: calc(var(--radius) - 4px);
  font-family: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", monospace;
  font-size: 0.625rem;           /* 10px */
  font-weight: 500;
  color: hsl(var(--muted-foreground));
  pointer-events: none;
  transition: opacity .15s;
  letter-spacing: 0.02em;
}
.h-search-input:focus ~ .h-search-kbd { opacity: 0; }
.h-search-input:not(:placeholder-shown) ~ .h-search-kbd { opacity: 0; }

/* 검색 결과 드롭다운 (shadcn Command + Popover) */
#search-dropdown {
  display: none;
  position: fixed;
  top: calc(var(--header-h) + 0.5rem);
  background: hsl(var(--popover));
  color: hsl(var(--popover-foreground));
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  box-shadow: 0 10px 38px -10px rgb(0 0 0 / 0.35),
              0 10px 20px -15px rgb(0 0 0 / 0.20);
  z-index: 60;
  width: 460px; max-width: calc(100vw - 2rem);
  max-height: 480px;
  overflow: hidden;
  flex-direction: column;
  animation: pop-in .12s ease;
}
@keyframes pop-in {
  from { opacity: 0; transform: translateY(-4px) scale(0.97); }
  to   { opacity: 1; transform: none; }
}
#search-dropdown.open { display: flex; }

.sd-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.625rem 0.875rem;
  border-bottom: 1px solid hsl(var(--border));
  flex-shrink: 0;
}
.sd-keyword {
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
}
.sd-keyword em {
  color: hsl(var(--foreground));
  font-style: normal;
  font-weight: 600;
}
.sd-count {
  font-size: 0.625rem;           /* 10px */
  color: hsl(var(--muted-foreground));
  font-variant-numeric: tabular-nums;
}
.sd-list {
  overflow-y: auto; flex: 1;
  padding: 0.25rem;
}
.sd-item {
  padding: 0.5rem 0.625rem;
  margin: 0.125rem 0;
  cursor: pointer;
  border-radius: calc(var(--radius) - 4px);
  transition: background-color .1s;
}
.sd-item:hover {
  background: hsl(var(--accent));
  color: hsl(var(--accent-foreground));
}
.sd-item-top {
  display: flex; align-items: center; gap: 0.5rem;
  margin-bottom: 0.25rem;
}
.sd-item-title {
  font-size: 0.8125rem; font-weight: 500;
  color: hsl(var(--foreground));
  flex: 1; min-width: 0;
}
.sd-item-group {
  font-size: 0.625rem;           /* 10px */
  color: hsl(var(--muted-foreground));
  flex-shrink: 0;
}
.sd-item-body {
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.sd-item-body mark {
  background: hsl(var(--warning) / 0.25);
  color: hsl(var(--foreground));
  border-radius: 2px;
  padding: 0 0.125rem;
  font-style: normal;
  font-weight: 500;
}
.sd-empty {
  padding: 2.5rem 1rem;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
}
.sd-empty-icon {
  width: 1.75rem;
  height: 1.75rem;
  color: hsl(var(--muted-foreground));
  opacity: 0.5;
  margin-bottom: 0.25rem;
}
.sd-empty-title {
  font-size: 0.875rem;
  font-weight: 500;
  color: hsl(var(--foreground));
}
.sd-empty-sub {
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
}
.sd-footer {
  padding: 0.5rem 0.875rem;
  border-top: 1px solid hsl(var(--border));
  font-size: 0.625rem;           /* 10px */
  color: hsl(var(--muted-foreground));
  flex-shrink: 0;
  display: flex; align-items: center; gap: 0.875rem;
}
.sd-foot-item {
  display: inline-flex;
  align-items: center;
  gap: 0.3125rem;
}
.sd-kbd {
  font-family: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", monospace;
  font-size: 0.625rem;           /* 10px */
  font-weight: 500;
  padding: 0.0625rem 0.3125rem;
  min-width: 1.125rem;
  height: 1.125rem;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid hsl(var(--border));
  border-radius: calc(var(--radius) - 4px);
  background: hsl(var(--muted));
  color: hsl(var(--muted-foreground));
}

/* ══════════════════════════════════════════
   TAG FILTER (카드 뷰)
══════════════════════════════════════════ */
.tag-filter-wrap {
  position: relative; display: inline-block;
}
.tag-filter-btn {
  display: inline-flex; align-items: center; gap: 0.375rem;
  height: 2rem;
  font-size: 0.8125rem;
  font-weight: 500;
  padding: 0 0.625rem;
  background: hsl(var(--background));
  border: 1px solid hsl(var(--input));
  border-radius: calc(var(--radius) - 4px);
  color: hsl(var(--foreground));
  cursor: pointer;
  transition: background-color .15s, border-color .15s;
  white-space: nowrap;
  font-family: inherit;
}
.tag-filter-btn:hover { background: hsl(var(--accent)); }
.tag-filter-btn:focus-visible {
  outline: 2px solid hsl(var(--ring));
  outline-offset: 2px;
}
.tag-filter-btn.has-filter {
  border-color: hsl(var(--foreground));
  background: hsl(var(--accent));
}
.tag-filter-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: hsl(var(--primary));
  color: hsl(var(--primary-foreground));
  border-radius: 9999px;
  font-size: 0.625rem;
  font-weight: 600;
  padding: 0 0.375rem;
  height: 1rem; min-width: 1rem;
  line-height: 1;
}

.tag-filter-dropdown {
  display: none;
  position: absolute; top: calc(100% + 0.25rem); left: 0;
  background: hsl(var(--popover));
  color: hsl(var(--popover-foreground));
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  box-shadow: 0 10px 38px -10px rgb(0 0 0 / 0.35),
              0 10px 20px -15px rgb(0 0 0 / 0.20);
  z-index: 60;
  min-width: 14rem; max-width: 18rem;
  max-height: 20rem; overflow-y: auto;
  padding: 0.25rem;
  animation: pop-in .12s ease;
}
.tag-filter-dropdown.open { display: block; }
.tfd-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.5rem 0.625rem 0.375rem;
  border-bottom: 1px solid hsl(var(--border));
  margin: 0 -0.25rem 0.25rem;
}
.tfd-label {
  font-size: 0.625rem;           /* 10px */
  font-weight: 500;
  color: hsl(var(--muted-foreground));
}
.tfd-clear {
  font-size: 0.625rem;           /* 10px */
  color: hsl(var(--foreground));
  background: none; border: none; cursor: pointer;
  font-family: inherit;
  font-weight: 500;
  transition: color .15s;
  padding: 0.125rem 0.375rem;
  border-radius: calc(var(--radius) - 4px);
}
.tfd-clear:hover {
  background: hsl(var(--accent));
}

/* ── shadcn Checkbox 항목 ── */
.tfd-item {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.4375rem 0.625rem;
  margin: 0.0625rem 0;
  cursor: pointer;
  border-radius: calc(var(--radius) - 4px);
  transition: background-color .12s;
}
.tfd-item:hover { background: hsl(var(--accent)); }

.tfd-check {
  width: 1rem; height: 1rem;
  border: 1px solid hsl(var(--border));
  border-radius: calc(var(--radius) - 4px);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: hsl(var(--background));
  transition: background-color .12s, border-color .12s;
}
.tfd-check.checked {
  background: hsl(var(--primary));
  border-color: hsl(var(--primary));
  color: hsl(var(--primary-foreground));
}
.tfd-check.checked::after {
  content: '';
  width: 0.625rem; height: 0.625rem;
  background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='20 6 9 17 4 12'/%3e%3c/svg%3e");
  background-size: contain;
  background-repeat: no-repeat;
}
.tfd-check.checked { font-size: 0; }  /* 기존 ✓ 텍스트 숨김 */

.tfd-tag-name {
  font-size: 0.8125rem;
  font-weight: 500;
  color: hsl(var(--foreground));
  flex: 1;
}
.tfd-tag-cnt {
  font-size: 0.625rem;           /* 10px */
  color: hsl(var(--muted-foreground));
  font-variant-numeric: tabular-nums;
}
.tfd-empty {
  padding: 0.875rem 1rem;
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
  text-align: center;
}

/* ══════════════════════════════════════════
   APP LAYOUT
══════════════════════════════════════════ */
#app {
  display: flex;
  padding-top: var(--header-h);
  min-height: 100vh;
}

/* ══════════════════════════════════════════
   LEFT SIDEBAR
══════════════════════════════════════════ */
/* ══════════════════════════════════════════
   SIDEBAR (Phase 2 - shadcn 스타일)
══════════════════════════════════════════ */
#sidebar {
  position: fixed;
  top: var(--header-h); left: 0; bottom: 0;
  width: var(--sidebar-w);
  background: hsl(var(--background));
  border-right: 1px solid hsl(var(--border));
  overflow-y: auto;
  z-index: 30;                     /* 헤더(50)보다 낮게 */
  padding: 0.75rem 0 2rem;
}

.sb-section {
  padding: 0.5rem 0.5rem;
}

.sb-label {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard Variable", "Apple SD Gothic Neo", sans-serif;
  font-size: 0.6875rem;          /* 11px — 섹션 레이블은 작게 유지 */
  font-weight: 500;
  color: hsl(var(--muted-foreground));
  padding: 0.5rem 0.75rem 0.375rem;
  letter-spacing: 0;
  text-transform: none;
}

/* ── 사이드바 항목 (shadcn ghost button 패턴) ── */
.sb-item {
  display: flex; align-items: center; gap: 0.625rem;
  padding: 0.4375rem 0.75rem;
  margin: 0 0.25rem;
  font-size: 0.875rem;
  font-weight: 500;
  color: hsl(var(--foreground));
  cursor: pointer;
  transition: background-color .15s, color .15s;
  border-radius: calc(var(--radius) - 2px);
  line-height: 1.4;
  border-left: none;
}
.sb-item:hover {
  background: hsl(var(--accent));
  color: hsl(var(--accent-foreground));
}
.sb-item.active {
  background: hsl(var(--secondary));
  color: hsl(var(--secondary-foreground));
  font-weight: 600;
}
.sb-item-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 1rem; height: 1rem;
  flex-shrink: 0;
  color: hsl(var(--muted-foreground));
}
.sb-item-icon svg {
  width: 1rem; height: 1rem;
  stroke-width: 2;
}
.sb-item.active .sb-item-icon { color: hsl(var(--foreground)); }

.sb-item-count {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard Variable", sans-serif;
  font-size: 0.625rem;           /* 10px */
  font-weight: 500;
  color: hsl(var(--muted-foreground));
  margin-left: auto;
  background: hsl(var(--muted));
  padding: 0.0625rem 0.4375rem;
  border-radius: 9999px;
  line-height: 1.5;
}

.sb-divider {
  height: 1px;
  background: hsl(var(--border));
  margin: 0.5rem 0.75rem;
}

/* ── prefix / 자유태그 드롭다운 (shadcn Select 패턴) ── */
.sb-section-title {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard Variable", "Apple SD Gothic Neo", sans-serif;
  font-size: 0.6875rem;
  font-weight: 500;
  color: hsl(var(--muted-foreground));
  padding: 0.375rem 0.75rem 0.25rem;
}
.sb-select {
  display: block;
  width: calc(100% - 1.5rem);
  margin: 0 0.75rem 0.375rem;
  height: 2rem;
  font-family: inherit;
  font-size: 0.8125rem;
  padding: 0 1.75rem 0 0.625rem;
  background: hsl(var(--background));
  border: 1px solid hsl(var(--input));
  border-radius: calc(var(--radius) - 4px);
  color: hsl(var(--foreground));
  outline: none;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
  appearance: none;
  background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23888' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpath d='m6 9 6 6 6-6'/%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 0.375rem center;
}
.sb-select:focus-visible {
  border-color: hsl(var(--ring));
  box-shadow: 0 0 0 3px hsl(var(--ring) / 0.15);
}

/* ── 컬럼 현황 (shadcn 미니멀 리스트) ── */
.sb-col-row {
  display: flex; align-items: center; gap: 0.625rem;
  padding: 0.375rem 0.875rem 0.375rem 1.25rem;
  margin: 0 0.25rem;
  font-size: 0.8125rem;
  color: hsl(var(--muted-foreground));
  border-radius: calc(var(--radius) - 2px);
  transition: background-color .15s;
}
.sb-col-row:hover { background: hsl(var(--accent) / 0.5); }
.sb-col-dot {
  width: 0.5rem; height: 0.5rem;
  border-radius: 50%;
  flex-shrink: 0;
}
.sb-col-name {
  flex: 1;
  font-size: 0.8125rem;
  color: hsl(var(--foreground));
}
.sb-col-cnt {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard Variable", sans-serif;
  font-size: 0.625rem;           /* 10px */
  color: hsl(var(--muted-foreground));
}

/* ── 사이드바 푸터 메타 정보 ── */
.sb-meta {
  padding: 0.75rem 1rem;
  margin-top: 0.5rem;
  font-size: 0.625rem;           /* 10px */
  color: hsl(var(--muted-foreground));
  line-height: 1.6;
}
.sb-meta-line { display: block; }

/* ── Task 2: 컬럼 row 클릭 가능 + active ── */
.sb-col-row { cursor: pointer; }
.sb-col-row.active {
  background: hsl(var(--secondary));
  border-radius: calc(var(--radius) - 2px);
}
.sb-col-row.active .sb-col-name {
  color: hsl(var(--foreground));
  font-weight: 600;
}
.sb-col-dot-all {
  background: transparent !important;
  border: 1.5px solid hsl(var(--muted-foreground));
}

/* ── Task 2: 카드뷰 컬럼 필터 chip ── */
.cg-active-col-chip {
  display: none;
  align-items: center; gap: 0.375rem;
  height: 1.75rem;
  padding: 0 0.625rem 0 0.5rem;
  background: hsl(var(--secondary));
  border: 1px solid hsl(var(--border));
  border-radius: 9999px;
  font-size: 0.75rem;
  font-weight: 500;
  color: hsl(var(--foreground));
  white-space: nowrap;
}
.cg-chip-dot {
  width: 0.5rem; height: 0.5rem;
  border-radius: 50%;
  flex-shrink: 0;
}
.cg-chip-clear {

/* ── Task 2: 사이드바 태그 섹션 ── */
.sb-tag-section { padding-bottom: 0.75rem; }
.sb-tag-head {
  display: flex; align-items: center; justify-content: space-between;

}
.sb-tag-count {

}

}
.sb-tag-search-icon {

}
.sb-tag-search-icon svg { width: 100%; height: 100%; }
.sb-tag-search-input {

  border: 1px solid hsl(var(--input));

}
.sb-tag-search-input::placeholder { color: hsl(var(--muted-foreground)); }
.sb-tag-search-input:focus-visible {
  border-color: hsl(var(--ring));

}
.sb-tag-search-clear {
  position: absolute; right: 0.375rem; top: 50%;
  transform: translateY(-50%);
  width: 1rem; height: 1rem;
  display: inline-flex; align-items: center; justify-content: center;
  background: transparent; border: 0;
  color: hsl(var(--muted-foreground));
  font-size: 0.875rem;
  cursor: pointer; border-radius: 9999px;
}
.sb-tag-search-clear:hover {
  background: hsl(var(--accent));
  color: hsl(var(--foreground));
}
.sb-tag-list {
  display: flex; flex-direction: column;
  max-height: 14rem;
  overflow-y: auto;
  padding: 0 0.25rem;
  scrollbar-width: thin;
  scrollbar-color: hsl(var(--border)) transparent;
}
.sb-tag-list::-webkit-scrollbar { width: 4px; }
.sb-tag-list::-webkit-scrollbar-thumb { background: hsl(var(--border)); border-radius: 9999px; }
.sb-tag-item {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.3125rem 0.5rem;
  margin: 0 0.25rem;
  font-size: 0.75rem;
  color: hsl(var(--foreground));
  border-radius: calc(var(--radius) - 4px);

}
.sb-tag-item:hover { background: hsl(var(--accent)); }
.sb-tag-item.selected {

}
.sb-tag-mark {
  display: inline-flex; align-items: center; justify-content: center;
  width: 0.875rem; height: 0.875rem;
  color: hsl(var(--muted-foreground));

}
.sb-tag-item.selected .sb-tag-mark { color: hsl(var(--primary)); font-weight: 700; }
.sb-tag-mark svg { width: 100%; height: 100%; }
.sb-tag-name {
  flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sb-tag-name mark {
  background: hsl(var(--warning) / 0.25);

}
.sb-tag-cnt {
  font-size: 0.625rem;           /* 10px */

}
.sb-tag-empty {

.sb-tag-clear-all {

  transition: background-color .12s;
}
.sb-tag-clear-all:hover { background: hsl(var(--accent)); color: hsl(var(--foreground)); }

/* ── Task 6: 문서뷰 트리 사이드바 ── */
.sb-doc-tree-empty {
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
  text-align: center;
  padding: 1rem 0.5rem;
}
.sb-tree-col { margin: 0 0.25rem; }
.sb-tree-col-head {
  display: flex; align-items: center; gap: 0.375rem;
  padding: 0.375rem 0.5rem 0.375rem 0.25rem;
  font-size: 0.8125rem;
  font-weight: 500;
  color: hsl(var(--foreground));
  border-radius: calc(var(--radius) - 4px);
  cursor: pointer;
  transition: background-color .12s;
  user-select: none;
}
.sb-tree-col-head:hover { background: hsl(var(--accent)); }
.sb-tree-col-dot {
  width: 0.5rem; height: 0.5rem;
  border-radius: 50%;
  flex-shrink: 0;
}
.sb-tree-col-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-tree-col-cnt { font-size: 0.625rem; color: hsl(var(--muted-foreground)); }
.sb-tree-chevron {
  display: inline-flex; align-items: center; justify-content: center;
  width: 1rem; height: 1rem;
  background: transparent; border: 0;
  color: hsl(var(--muted-foreground));

  flex-shrink: 0;
  padding: 0;
}
.sb-tree-chevron svg { width: 0.75rem; height: 0.75rem; }

.sb-tree-col-body { padding-left: 0.5rem; margin-top: 0.0625rem; }
.sb-tree-grp-head {
  display: flex; align-items: center; gap: 0.375rem;
  padding: 0.25rem 0.5rem 0.25rem 0.625rem;
  font-size: 0.75rem;
  font-weight: 500;
  color: hsl(var(--muted-foreground));
  border-radius: calc(var(--radius) - 4px);
  cursor: pointer;
  transition: background-color .12s, color .12s;
  user-select: none;
}
.sb-tree-grp-head:hover { background: hsl(var(--accent)); color: hsl(var(--foreground)); }
.sb-tree-grp-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-tree-grp-cnt { font-size: 0.625rem; }
.sb-tree-grp-body { padding-left: 0.625rem; }
.sb-tree-card {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.3125rem 0.5rem 0.3125rem 1.125rem;
  margin: 0.0625rem 0;
  font-size: 0.75rem;
  color: hsl(var(--foreground));
  border-radius: calc(var(--radius) - 4px);
  cursor: pointer;
  transition: background-color .12s, color .12s;
  position: relative;
}
.sb-tree-card:hover { background: hsl(var(--accent)); }
.sb-tree-card.active {
  background: hsl(var(--secondary));
  color: hsl(var(--foreground));
  font-weight: 600;
}
.sb-tree-card.active::before {
  content: '';
  position: absolute;
  left: 0.5rem; top: 50%;
  width: 2px; height: 1rem;
  transform: translateY(-50%);
  background: hsl(var(--primary));
  border-radius: 1px;
}
.sb-tree-card-title {
  flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── 태그 전체 해제 버튼 (prefix 섹션) ─────────────── */
.sb-tag-clear-btn {
  display: inline-flex;
  align-items: center;
  font-size: 0.72rem;
  color: hsl(var(--muted-foreground));
  background: none;
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius-sm, 4px);
  padding: 0.15rem 0.5rem;
  cursor: pointer;
  margin-top: 0.25rem;
  transition: color 0.15s, border-color 0.15s;
  font-family: inherit;
}
.sb-tag-clear-btn:hover {
  color: hsl(var(--foreground));
  border-color: hsl(var(--foreground));
}


/* styles/kanban.css */
/* ══════════════════════════════════════════
   MAIN
══════════════════════════════════════════ */
#main {
  margin-left: var(--sidebar-w);
  flex: 1; min-width: 0;
}

/* ══════════════════════════════════════════
   VIEW WRAPPER
══════════════════════════════════════════ */
.view { display: none; }
.view.active {
  display: block;
  min-height: calc(100vh - var(--header-h));
}

/* ══════════════════════════════════════════
   VIEW TOOLBAR
══════════════════════════════════════════ */
.view-bar {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.875rem 1.5rem;
  border-bottom: 1px solid hsl(var(--border));
  background: hsl(var(--background));
  position: sticky; top: var(--header-h); z-index: 20;
  flex-wrap: wrap;
}
.view-bar-title {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard Variable", "Apple SD Gothic Neo", sans-serif;
  font-size: 0.9375rem;
  font-weight: 600;
  color: hsl(var(--foreground));
  letter-spacing: -0.01em;
}
.vb-spacer { flex: 1; min-width: 0.2rem; }

/* ── filter-sel: shadcn Select 스타일 ── */
.filter-sel {
  display: inline-flex; align-items: center;
  height: 2rem;
  font-family: inherit;
  font-size: 0.8125rem;
  padding: 0 0.625rem;
  background: hsl(var(--background));
  border: 1px solid hsl(var(--input));
  border-radius: calc(var(--radius) - 4px);
  color: hsl(var(--foreground));
  outline: none;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
  appearance: none;
  background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23888' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpath d='m6 9 6 6 6-6'/%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 0.375rem center;
  padding-right: 1.75rem;
}
.filter-sel:focus-visible {
  border-color: hsl(var(--ring));
  box-shadow: 0 0 0 3px hsl(var(--ring) / 0.15);
}

/* ── view toggle: shadcn ToggleGroup 스타일 ── */
.view-toggle {
  display: inline-flex; gap: 0.125rem;
  background: hsl(var(--muted));
  border: 1px solid hsl(var(--border));
  border-radius: calc(var(--radius) - 4px);
  padding: 0.1875rem;
  height: 2rem;
}
.vt-btn {
  display: inline-flex; align-items: center; justify-content: center;
  font-family: inherit;
  font-size: 0.75rem;
  font-weight: 500;
  padding: 0 0.625rem;
  border: none;
  background: transparent;
  color: hsl(var(--muted-foreground));
  border-radius: calc(var(--radius) - 6px);
  transition: background-color .15s, color .15s;
  cursor: pointer;
}
.vt-btn:hover { color: hsl(var(--foreground)); }
.vt-btn.active {
  background: hsl(var(--background));
  color: hsl(var(--foreground));
  box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
}

/* ══════════════════════════════════════════
   ① KANBAN VIEW (Phase 3 - shadcn Card 패턴)
══════════════════════════════════════════ */
#view-kanban { min-height: calc(100vh - var(--header-h)); }
#view-kanban.active { display: flex; flex-direction: column; }

#kb-board-wrap {
  flex: 1; overflow-x: auto;
  padding: 1.25rem 1.5rem 3.75rem;
}
#kb-board {
  display: flex; gap: 0.875rem; align-items: flex-start;
  min-width: max-content;
}

/* ── 컬럼: shadcn Card (muted 배경) ─────── */
.kb-col {
  width: 17rem; flex-shrink: 0;
  background: hsl(var(--muted) / 0.4);
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  display: flex; flex-direction: column;
  max-height: calc(100vh - var(--header-h) - 6.25rem);
  transition: border-color .15s, background-color .15s;
}
.kb-col.drag-over {
  border-color: hsl(var(--ring));
  background: hsl(var(--accent));
}

.kb-col-head {
  padding: 0.6875rem 0.75rem 0.625rem;
  display: flex; align-items: center; gap: 0.5rem;
  flex-shrink: 0;
}
.kb-col-dot {
  width: 0.5rem; height: 0.5rem; border-radius: 50%;
  flex-shrink: 0; cursor: pointer;
  transition: transform .15s;
}
.kb-col-dot:hover { transform: scale(1.25); }
.kb-col-name {
  font-family: inherit;
  font-size: 0.8125rem; font-weight: 600;
  color: hsl(var(--foreground));
  letter-spacing: -0.01em;
  flex: 1; border: none; background: transparent;
  outline: none; min-width: 0; cursor: text;
  padding: 0.125rem 0.25rem;
  border-radius: calc(var(--radius) - 4px);
  transition: background-color .15s;
}
.kb-col-name:hover { background: hsl(var(--background) / 0.5); }
.kb-col-name:focus {
  background: hsl(var(--background));
  box-shadow: 0 0 0 2px hsl(var(--ring) / 0.15);
}
.kb-col-cnt {
  display: inline-flex; align-items: center;
  font-size: 0.625rem; font-weight: 500; /* 10px */
  color: hsl(var(--muted-foreground));
  background: hsl(var(--background));
  border: 1px solid hsl(var(--border));
  border-radius: 9999px;
  padding: 0 0.4375rem;
  height: 1.125rem;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.kb-col-acts { display: flex; gap: 0.125rem; flex-shrink: 0; }
.kb-col-btn {
  width: 1.5rem; height: 1.5rem;
  border: none; background: transparent;
  color: hsl(var(--muted-foreground));
  font-size: 0.875rem;
  border-radius: calc(var(--radius) - 4px);
  display: flex; align-items: center; justify-content: center;
  transition: background-color .15s, color .15s;
}
.kb-col-btn:hover {
  background: hsl(var(--accent));
  color: hsl(var(--accent-foreground));
}

.kb-cards {
  flex: 1; overflow-y: auto;
  padding: 0.25rem 0.5rem 0.25rem;
  display: flex; flex-direction: column; gap: 0.4375rem;
  min-height: 2.75rem;
}

/* ── 카드: shadcn Card (작은 변형) ──────── */
.kb-card {
  background: hsl(var(--card));
  border: 1px solid hsl(var(--border));
  border-radius: calc(var(--radius) - 2px);
  padding: 0.625rem 0.6875rem 0.5625rem 0.75rem;
  cursor: grab; position: relative;
  user-select: none;
  box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.04);
  transition: box-shadow .15s, border-color .15s, transform .1s;
}
.kb-card:active { cursor: grabbing; }
.kb-card:hover {
  border-color: hsl(var(--foreground) / 0.2);
  box-shadow: 0 2px 6px -1px rgb(0 0 0 / 0.08), 0 1px 3px -1px rgb(0 0 0 / 0.06);
  transform: translateY(-1px);
}
.kb-card.dragging {
  opacity: .4;
  transform: scale(.98);
  cursor: grabbing;
}
.kb-card.drag-ph {
  background: hsl(var(--accent));
  border: 1px dashed hsl(var(--ring) / 0.4);
  box-shadow: none;
  min-height: 3.25rem;
}

/* 우선순위 좌측 1px 보더 (정밀) */
.kb-card-bar {
  position: absolute; left: 0; top: 0.5rem; bottom: 0.5rem;
  width: 2px;
  border-radius: 2px;
}
.kb-card-title {
  font-size: 0.8125rem; font-weight: 600;
  color: hsl(var(--foreground));
  line-height: 1.4;
  margin-bottom: 0.25rem;
  letter-spacing: -0.005em;
  word-break: break-word;
  padding-right: 1.25rem; /* edit 버튼 자리 */
}
.kb-card-body {
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
  line-height: 1.55;
  margin-bottom: 0.4375rem;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden;
}
.kb-card-foot {
  display: flex; align-items: center; gap: 0.25rem;
  flex-wrap: wrap;
}
.kb-card-date {
  font-size: 0.625rem;           /* 10px */
  color: hsl(var(--muted-foreground));
  margin-left: auto;
  font-variant-numeric: tabular-nums;
}
.kb-card-edit {
  position: absolute; top: 0.375rem; right: 0.375rem;
  width: 1.25rem; height: 1.25rem;
  border: none; background: transparent;
  color: hsl(var(--muted-foreground));
  border-radius: calc(var(--radius) - 4px);
  display: none; align-items: center; justify-content: center;
  transition: background-color .12s, color .12s;
}
.kb-card:hover .kb-card-edit { display: flex; }
.kb-card-edit:hover {
  background: hsl(var(--accent));
  color: hsl(var(--accent-foreground));
}
.kb-card-edit svg { width: 0.75rem; height: 0.75rem; }

.kb-add-card {
  margin: 0.125rem 0.5rem 0.5rem;
  padding: 0.4375rem;
  border: 1px dashed hsl(var(--border));
  background: transparent;
  border-radius: calc(var(--radius) - 2px);
  color: hsl(var(--muted-foreground));
  font-family: inherit;
  font-size: 0.75rem;
  font-weight: 500;
  transition: background-color .15s, color .15s, border-color .15s;
  text-align: center;
  flex-shrink: 0;
}
.kb-add-card:hover {
  background: hsl(var(--accent));
  color: hsl(var(--accent-foreground));
  border-color: hsl(var(--foreground) / 0.2);
}

#kb-add-col-btn {
  width: 2.75rem; flex-shrink: 0;
  background: transparent;
  border: 1px dashed hsl(var(--border));
  border-radius: var(--radius);
  color: hsl(var(--muted-foreground));
  font-size: 1.25rem;
  transition: background-color .15s, color .15s, border-color .15s;
  align-self: stretch;
  min-height: 5.625rem;
}
#kb-add-col-btn:hover {
  background: hsl(var(--accent));
  color: hsl(var(--accent-foreground));
  border-color: hsl(var(--foreground) / 0.2);
}


/* styles/cardgrid.css */
/* ══════════════════════════════════════════
   ② CARD GRID VIEW (Phase 3 - shadcn Card 그리드)
══════════════════════════════════════════ */
#view-cards.active { display: block; }

.cg-grid {

.cg-add-card:hover {

  background: hsl(var(--accent) / 0.5);
}
.cg-add-card svg { width: 1rem; height: 1rem; flex-shrink: 0; }

/* 우선순위 미세 좌측 보더 */
.cg-card-prio {
  position: absolute;
  left: 0; top: 0.75rem; bottom: 0.75rem;
  width: 2px;
  border-radius: 2px;

/* 그룹 라벨: 작은 muted 텍스트 */
.cg-card-group {
  font-size: 0.625rem;           /* 10px */
  font-weight: 500;
  color: hsl(var(--muted-foreground));
  margin-bottom: 0.375rem;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.cg-card-title {
  font-size: 0.875rem;
  font-weight: 600;
  color: hsl(var(--foreground));
  letter-spacing: -0.01em;
  line-height: 1.4;
  margin-bottom: 0.4375rem;
  word-break: break-word;
}
.cg-card-body {
  font-size: 0.8125rem;
  color: hsl(var(--muted-foreground));
  line-height: 1.6;
  margin-bottom: 0.75rem;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
  flex: 1;
}
.cg-card-foot {
  display: flex; align-items: center; gap: 0.3125rem;
  flex-wrap: wrap;
  margin-top: auto;
}
/* ══════════════════════════════════════════
   EMPTY STATE (공통 — 카드그리드 / 리스트 / 변경이력)
══════════════════════════════════════════ */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 4rem 1.5rem;
  gap: 0.5rem;
}
.empty-state-icon {
  width: 2.75rem;
  height: 2.75rem;
  margin-bottom: 0.375rem;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 9999px;
  background: hsl(var(--muted));
  color: hsl(var(--muted-foreground));
}
.empty-state-icon svg {
  width: 1.375rem;
  height: 1.375rem;
}
.empty-state-title {
  font-size: 0.9375rem;
  font-weight: 600;
  color: hsl(var(--foreground));
  letter-spacing: -0.005em;
}
.empty-state-sub {
  font-size: 0.8125rem;
  color: hsl(var(--muted-foreground));
  line-height: 1.55;
  max-width: 22rem;
}

.cg-empty {
  grid-column: 1/-1;
}


/* styles/listview.css */
/* ══════════════════════════════════════════
   ③ LIST VIEW (Phase 3 - shadcn Table)
══════════════════════════════════════════ */
#view-list.active { display: block; }

.lv-wrap {
  overflow-x: auto;
  overflow-y: auto;
  padding: 0 1.5rem 3.75rem;
  max-height: calc(100vh - var(--header-h) - 3.25rem);
}
.lv-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8125rem;
  caption-side: bottom;
  margin-right: 20px;
}
.lv-table thead {
  border-bottom: 1px solid hsl(var(--border));
}
.lv-table th {
  height: 2.75rem;
  padding: 0 0.75rem;
  text-align: left;
  vertical-align: middle;
  font-family: inherit;
  font-size: 0.75rem;
  font-weight: 500;
  color: hsl(var(--muted-foreground));
  letter-spacing: 0;
  text-transform: none;
  white-space: nowrap;
  background: hsl(var(--background));
  position: sticky; top: 0;
  cursor: pointer;
  user-select: none;
  transition: color .15s;
  z-index: 1;
}
.lv-table th:hover { color: hsl(var(--foreground)); }
.lv-table th.sorted { color: hsl(var(--foreground)); }
.lv-th-inner {
  display: inline-flex; align-items: center; gap: 0.25rem;
}
.lv-sort-ico {
  width: 0.75rem; height: 0.75rem;
  flex-shrink: 0;
  color: hsl(var(--muted-foreground));
  opacity: 0.4;
  transition: opacity .15s, color .15s;
}
.lv-table th:hover .lv-sort-ico { opacity: 0.7; }
.lv-table th.sorted .lv-sort-ico {
  opacity: 1;
  color: hsl(var(--foreground));
}

.lv-table tbody tr {
  border-bottom: 1px solid hsl(var(--border));
  cursor: pointer;
  transition: background-color .12s;
}
.lv-table tbody tr:last-child {
  border-bottom: none;
}
.lv-table tbody tr:hover {
  background: hsl(var(--muted) / 0.5);
}
.lv-table td {
  padding: 0.75rem;
  vertical-align: top;
  color: hsl(var(--foreground));
  line-height: 1.5;
}
.td-title {
  font-weight: 500;
  color: hsl(var(--foreground));
  max-width: 14rem;
}
.td-body {
  max-width: 18rem;
  color: hsl(var(--muted-foreground));
  font-size: 0.75rem;
}
.td-group {
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
  white-space: nowrap;
}
.td-prio {
  display: inline-flex; align-items: center; gap: 0.375rem;
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
  white-space: nowrap;
}
.td-prio-dot {
  width: 0.4375rem; height: 0.4375rem;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── 우선순위 색상 (전역 적용: kb-card-bar / cg-card-prio / td-prio-dot) ── */
.prio-high { background: hsl(var(--destructive)); }
.prio-mid  { background: hsl(var(--warning)); }
.prio-low  { background: hsl(var(--success)); }
.lv-empty {
  padding: 0;
  border: none;
}
.lv-empty:hover { background: transparent; }

/* ══════════════════════════════════════════
   MARKDOWN RENDER STYLES  (Phase 1)
   .md-* 클래스: parseMarkdown() 출력 전용
   문서뷰/카드 본문 양쪽에서 공유
══════════════════════════════════════════ */
.md-body { line-height: 1.75; color: hsl(var(--foreground)); }
.md-body .md-h1,.md-body .md-h2,.md-body .md-h3,
.md-body .md-h4,.md-body .md-h5,.md-body .md-h6 {
  font-weight: 700;
  letter-spacing: -0.02em;
  margin: 1.4em 0 0.4em;
  line-height: 1.3;
  color: hsl(var(--foreground));
}
.md-body .md-h1 { font-size: 1.6rem; border-bottom: 1px solid hsl(var(--border)); padding-bottom: 0.3em; }
.md-body .md-h2 { font-size: 1.25rem; border-bottom: 1px solid hsl(var(--border)); padding-bottom: 0.2em; }
.md-body .md-h3 { font-size: 1.05rem; }
.md-body .md-h4 { font-size: 0.95rem; }
.md-body .md-h5,.md-body .md-h6 { font-size: 0.875rem; color: hsl(var(--muted-foreground)); }
.md-body .md-p  { margin: 0.6em 0; }
.md-body .md-bq {
  border-left: 3px solid hsl(var(--border));
  margin: 0.8em 0;
  padding: 0.3em 0.9em;
  color: hsl(var(--muted-foreground));
  font-style: italic;
}
.md-body .md-pre {
  background: hsl(var(--muted));
  border: 1px solid hsl(var(--border));
  border-radius: calc(var(--radius) - 2px);
  padding: 0.875rem 1rem;
  overflow-x: auto;
  margin: 0.8em 0;
  font-size: 0.8125rem;
}
.md-body .md-pre code { font-family: ui-monospace,"SF Mono","Cascadia Code","Roboto Mono",monospace; }
.md-body code {
  background: hsl(var(--muted));
  border: 1px solid hsl(var(--border));
  border-radius: 3px;
  padding: 0.1em 0.35em;
  font-size: 0.85em;
  font-family: ui-monospace,"SF Mono","Cascadia Code","Roboto Mono",monospace;
}
.md-body .md-pre code { background:none; border:none; padding:0; font-size:inherit; }
.md-body .md-hr {
  border: none;
  border-top: 1px solid hsl(var(--border));
  margin: 1.4em 0;
}
.md-body .md-ul,.md-body .md-ol {
  padding-left: 1.5em;
  margin: 0.6em 0;
}
.md-body .md-ul li,.md-body .md-ol li { margin: 0.2em 0; }
.md-body .md-checklist { list-style: none; padding-left: 0.25em; }
.md-body .md-check-item {
  display: flex; align-items: flex-start; gap: 0.4em; margin: 0.25em 0;
}
.md-body .md-check-item input[type="checkbox"] {
  margin-top: 0.2em; flex-shrink: 0; accent-color: hsl(var(--primary));
}
.md-body .md-img {
  max-width: 100%; border-radius: calc(var(--radius) - 2px);
  margin: 0.5em 0; display: block;
  border: 1px solid hsl(var(--border));
}
.md-body a { color: hsl(217 91% 50%); text-decoration: underline; text-underline-offset: 2px; }
.md-body a:hover { color: hsl(217 91% 40%); }
.dark .md-body a { color: hsl(217 91% 70%); }
.md-body strong { font-weight: 700; }
.md-body em     { font-style: italic; }
.md-body del    { text-decoration: line-through; color: hsl(var(--muted-foreground)); }


/* styles/docview.css */
/* ══════════════════════════════════════════
   ④ DOCUMENT VIEW (Phase 4)
══════════════════════════════════════════ */
#view-document.active { display: block; }

/* ══════════════════════════════════════════
   TOC 레이아웃 — dv-wrap + dv-toc 나란히
══════════════════════════════════════════ */
.dv-layout {
  display: flex;
  align-items: flex-start;
  gap: 0;
  position: relative;
  /* 큰 화면 대응: 본문+TOC 묶음을 컨테이너 중앙으로 */
  max-width: 88rem;
  margin: 0 auto;
}

/* 본문 영역 — TOC가 있을 때 max-width 유지하며 flex-shrink 0 */
.dv-layout .dv-wrap {
  flex: 1;
  min-width: 0;
  max-width: 64rem;
}

/* ── TOC 패널 ── */
.dv-toc {
  flex: 0 0 14rem;           /* 224px 고정 */
  position: sticky;
  /* 헤더(56px) + view-bar(약 53px) 합산 */
  top: calc(var(--header-h) + 3.5rem);
  max-height: calc(100vh - var(--header-h) - 5rem);
  overflow-y: auto;
  padding: 1.25rem 0 1rem 1.5rem;
  /* 스크롤바 얇게 */
  scrollbar-width: thin;
  scrollbar-color: hsl(var(--border)) transparent;
}
.dv-toc::-webkit-scrollbar { width: 4px; }
.dv-toc::-webkit-scrollbar-track { background: transparent; }
.dv-toc::-webkit-scrollbar-thumb { background: hsl(var(--border)); border-radius: 9999px; }

/* TOC 제목 라벨 */
.dv-toc-label {
  font-size: 0.625rem;           /* 10px */
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: hsl(var(--muted-foreground));
  padding: 0 0.375rem 0.5rem;
  display: block;
}

/* TOC 항목 리스트 */
.dv-toc-list {
  display: flex;
  flex-direction: column;
  gap: 0.0625rem;
}

/* TOC 항목 — 기본 */
.dv-toc-item {
  display: block;
  font-size: 0.8125rem;
  line-height: 1.45;
  color: hsl(var(--muted-foreground));
  text-decoration: none;
  padding: 0.3125rem 0.5rem;
  border-radius: calc(var(--radius) - 4px);
  border-left: 2px solid transparent;
  transition: color .12s, background .12s, border-color .12s;
  white-space: normal;
  word-break: keep-all;
}
.dv-toc-item:hover {
  color: hsl(var(--foreground));
  background: hsl(var(--accent));
}

/* 레벨별 들여쓰기 */
.dv-toc-h1 { padding-left: 0.5rem; font-weight: 500; }
.dv-toc-h2 { padding-left: 1rem; }
.dv-toc-h3 { padding-left: 1.625rem; font-size: 0.75rem; }

/* 활성 항목 */
.dv-toc-item.active {
  color: hsl(var(--foreground));
  border-left-color: hsl(var(--primary));
  background: hsl(var(--primary) / 0.06);
  font-weight: 500;
}

/* ── 반응형 ── */
/* 1280px 이상: TOC 완전 표시 (224px) */
/* 1024~1279px: TOC 폭 줄임 */
@media (max-width: 1279px) and (min-width: 1024px) {
  .dv-toc { flex: 0 0 11rem; }
  .dv-toc-item { font-size: 0.75rem; }
  .dv-layout > .dv-wrap { padding-left: 2rem; }
}

/* 1023px 이하: TOC 숨김 (본문 전체 폭) */
@media (max-width: 1023px) {
  .dv-toc { display: none !important; }
  .dv-layout {
    max-width: 64rem;
    margin: 0 auto;
  }
  .dv-layout .dv-wrap { max-width: 64rem; margin: 0 auto; padding-left: 2rem; padding-right: 2rem; }
}

.dv-bar-pos {
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
  font-weight: 400;
  margin-left: 0.5rem;
}

.dv-wrap {
  padding: 2.25rem 3rem 4rem;
  max-width: 64rem;
  margin: 0 auto;
}

/* dv-layout(flex) 안에서는 margin:auto 해제 — flex가 정렬을 담당 */
.dv-layout > .dv-wrap {
  margin: 0;
  padding-left: 3rem;
  padding-right: 1.5rem;
}

/* Task 7: scroll-margin-top — 헤더+view-bar에 가려지지 않도록 */
.dv-body .md-h1[id],
.dv-body .md-h2[id],
.dv-body .md-h3[id],
.dv-body .md-h4[id],
.dv-body .md-h5[id],
.dv-body .md-h6[id] {
  scroll-margin-top: calc(var(--header-h) + 4rem);
}

.dv-empty {
  padding: 4rem 1.5rem;
  text-align: center;
  color: hsl(var(--muted-foreground));
}

/* 메타 영역 (제목 위) */
.dv-meta {
  display: flex; flex-wrap: wrap; gap: 0.5rem;
  align-items: center;
  margin-bottom: 1rem;
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
}
.dv-meta-col {
  display: inline-flex; align-items: center; gap: 0.375rem;
  padding: 0.1875rem 0.5rem;
  border: 1px solid hsl(var(--border));
  border-radius: 9999px;
  background: hsl(var(--background));
}
.dv-meta-col-dot {
  width: 0.5rem; height: 0.5rem;
  border-radius: 9999px;
  flex-shrink: 0;
}
.dv-meta-group {
  display: inline-flex; align-items: center; gap: 0.25rem;
  font-weight: 500;
  color: hsl(var(--foreground));
}
.dv-meta-prio,
.dv-meta-status {
  display: inline-flex; align-items: center;
  padding: 0.1875rem 0.5rem;
  border-radius: calc(var(--radius) - 4px);
  font-size: 0.625rem; font-weight: 500; /* 10px */
}
.dv-meta-prio.high   { background: hsl(0 75% 92%);   color: hsl(0 75% 30%);   }
.dv-meta-prio.mid    { background: hsl(38 92% 92%);  color: hsl(38 92% 30%);  }
.dv-meta-prio.low    { background: hsl(142 30% 92%); color: hsl(142 50% 30%); }
.dark .dv-meta-prio.high { background: hsl(0 60% 20%);   color: hsl(0 80% 80%); }
.dark .dv-meta-prio.mid  { background: hsl(38 60% 20%);  color: hsl(38 90% 80%); }
.dark .dv-meta-prio.low  { background: hsl(142 40% 20%); color: hsl(142 60% 80%); }

.dv-meta-status.wait  { background: hsl(var(--muted));      color: hsl(var(--muted-foreground)); }
.dv-meta-status.doing { background: hsl(217 91% 92%);       color: hsl(217 91% 35%); }
.dv-meta-status.done  { background: hsl(142 71% 92%);       color: hsl(142 71% 30%); }
.dark .dv-meta-status.doing { background: hsl(217 60% 20%); color: hsl(217 91% 80%); }
.dark .dv-meta-status.done  { background: hsl(142 40% 20%); color: hsl(142 60% 80%); }

.dv-meta-tags {
  display: inline-flex; flex-wrap: wrap; gap: 0.25rem;
  font-size: 0.625rem;           /* 10px */
}
.dv-meta-tag {
  padding: 0.125rem 0.4375rem;
  background: hsl(var(--secondary));
  color: hsl(var(--secondary-foreground));
  border-radius: 9999px;
}

/* 제목 */
.dv-title {
  font-size: 1.875rem;
  font-weight: 600;
  letter-spacing: -0.025em;
  line-height: 1.25;
  color: hsl(var(--foreground));
  margin-bottom: 1.5rem;
  word-break: break-word;
}

/* 본문 */
.dv-body {
  font-size: 1.0625rem;
  line-height: 1.7;
  color: hsl(var(--foreground));
  word-break: break-word;
}
.dv-body-empty {
  font-style: italic;
  color: hsl(var(--muted-foreground));
}

/* 푸터: 이전/다음 */
.dv-foot {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
  margin-top: 3rem;
  padding-top: 1.5rem;
  border-top: 1px solid hsl(var(--border));
}
.dv-nav-btn {
  display: flex; flex-direction: column;
  padding: 0.875rem 1rem;
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  background: hsl(var(--card));
  color: hsl(var(--foreground));
  cursor: pointer;
  text-align: left;
  transition: border-color .12s, background-color .12s;
  min-width: 0;
}
.dv-nav-btn:hover:not(:disabled) {
  border-color: hsl(var(--ring));
  background: hsl(var(--accent));
}
.dv-nav-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.dv-nav-btn.next { text-align: right; }
.dv-nav-label {
  font-size: 0.625rem;           /* 10px */
  color: hsl(var(--muted-foreground));
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.25rem;
}
.dv-nav-title {
  font-size: 0.875rem; font-weight: 500;
  color: hsl(var(--foreground));
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* 카드 우상단 문서뷰 진입 아이콘 */
.dv-go-btn {
  position: absolute;
  top: 0.25rem;
  right: 2rem;            /* 편집 버튼 옆 */
  display: inline-flex; align-items: center; justify-content: center;
  width: 1.5rem; height: 1.5rem;
  padding: 0;
  background: transparent;
  border: 1px solid transparent;
  border-radius: calc(var(--radius) - 4px);
  color: hsl(var(--muted-foreground));
  cursor: pointer;
  opacity: 0;
  transition: opacity .15s, background-color .12s, color .12s;
}
.dv-go-btn:hover {
  background: hsl(var(--accent));
  color: hsl(var(--accent-foreground));
}
.dv-go-btn svg { width: 0.875rem; height: 0.875rem; stroke-width: 2; }
.kb-card:hover .dv-go-btn,
.cg-card:hover .dv-go-btn {
  opacity: 1;
}

/* 리스트 행의 dv-go-btn은 셀 안에 인라인 표시 */
.lv-table .dv-go-btn {
  position: static;
  opacity: 0.6;
  width: 1.25rem; height: 1.25rem;
  padding-top: 3px;
}
.lv-table .dv-go-btn:hover { opacity: 1; }

/* 카드 모달 헤더의 문서뷰 버튼 (Phase 4 활성화) */
.cm-docview-btn:not(:disabled) {
  cursor: pointer;
}

/* ══════════════════════════════════════════
   PHASE 5 — 문서뷰 인라인 편집
══════════════════════════════════════════ */

/* 헤더 액션바 — 편집 모드일 때 저장/취소 버튼 컨테이너 */
.dv-edit-actions {
  display: inline-flex;
  align-items: center;
  gap: 0.375rem;
}

/* 인라인 편집 영역 wrapper — dv-body 자리에 들어감 */
.dv-edit-area {
  margin-top: 0.25rem;
}

/* 인라인 markdown textarea — cm-body-md와 동일한 모노 톤 */
.dv-edit-md {
  min-height: 18rem;
  font-family:
    ui-monospace, "SF Mono", "Cascadia Code",
    "Roboto Mono", Menlo, Monaco, Consolas, monospace;
  font-size: 0.875rem;
  line-height: 1.7;
  tab-size: 2;
  width: 100%;
  resize: vertical;
  border: 1px solid hsl(var(--input));
  border-top: none;
  border-radius: 0 0 calc(var(--radius) - 2px) calc(var(--radius) - 2px);
  padding: 0.75rem 0.875rem;
  background: hsl(var(--background));
  color: hsl(var(--foreground));
  outline: none;
  display: block;
  box-sizing: border-box;
}
.dv-edit-md:focus {
  border-color: hsl(var(--ring));
  box-shadow: 0 0 0 1px hsl(var(--ring));
}

/* ── 문서뷰 메타 편집 패널 ─────────────────────────── */
.dv-meta-edit {
  display: flex;
  flex-direction: column;
  gap: 0.625rem;
  padding: 0.875rem 1rem;
  margin-bottom: 0.25rem;
  background: hsl(var(--muted) / 0.4);
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
}
.dv-me-row {
  display: flex;
  align-items: center;
  gap: 0.625rem;
  min-height: 2rem;
}
.dv-me-label {
  flex: 0 0 4.5rem;
  font-size: 0.75rem;
  font-weight: 600;
  color: hsl(var(--muted-foreground));
  letter-spacing: 0.02em;
  user-select: none;
}
/* 제목 input */
.dv-me-title-input {
  width: 100%;
  font-size: 1.5rem;
  font-weight: 700;
  line-height: 1.25;
  padding: 0.25rem 0.375rem;
  background: transparent;
  border: 1px solid transparent;
  border-radius: calc(var(--radius) - 4px);
  color: hsl(var(--foreground));
  outline: none;
  transition: border-color .12s, background .12s;
  margin-bottom: 0.125rem;
  box-sizing: border-box;
}
.dv-me-title-input:hover { border-color: hsl(var(--border)); }
.dv-me-title-input:focus {
  border-color: hsl(var(--ring));
  background: hsl(var(--background));
  box-shadow: 0 0 0 1px hsl(var(--ring));
}
/* 텍스트 input (그룹, 태그) */
.dv-me-input {
  flex: 1;
  height: 2rem;
  padding: 0 0.5rem;
  font-size: 0.875rem;
  font-family: inherit;
  background: hsl(var(--background));
  border: 1px solid hsl(var(--input));
  border-radius: calc(var(--radius) - 4px);
  color: hsl(var(--foreground));
  outline: none;
  box-sizing: border-box;
}
.dv-me-input:focus {
  border-color: hsl(var(--ring));
  box-shadow: 0 0 0 1px hsl(var(--ring));
}
.dv-me-input::placeholder { color: hsl(var(--muted-foreground)); }
/* select */
.dv-me-select {
  flex: 1;
  height: 2rem;
  padding: 0 0.5rem;
  font-size: 0.875rem;
  font-family: inherit;
  background: hsl(var(--background));
  border: 1px solid hsl(var(--input));
  border-radius: calc(var(--radius) - 4px);
  color: hsl(var(--foreground));
  outline: none;
  cursor: pointer;
}
.dv-me-select:focus {
  border-color: hsl(var(--ring));
  box-shadow: 0 0 0 1px hsl(var(--ring));
}
/* 토글 버튼 그룹 */
.dv-me-toggle-row {
  display: flex;
  gap: 0.375rem;
  flex-wrap: wrap;
}
.dv-me-btn {
  height: 1.75rem;
  padding: 0 0.625rem;
  font-size: 0.8rem;
  font-weight: 500;
  font-family: inherit;
  border-radius: calc(var(--radius) - 4px);
  border: 1px solid hsl(var(--border));
  background: hsl(var(--background));
  color: hsl(var(--foreground));
  cursor: pointer;
  transition: background .1s, color .1s, border-color .1s;
  line-height: 1;
}
.dv-me-btn:hover { background: hsl(var(--accent)); }
.dv-me-btn:focus-visible { outline: 2px solid hsl(var(--ring)); outline-offset: 2px; }
/* 우선순위 */
.dv-me-btn.sel-h { background: hsl(0 75% 92%);   color: hsl(0 75% 30%);   border-color: hsl(0 75% 80%); }
.dv-me-btn.sel-m { background: hsl(38 92% 90%);  color: hsl(38 92% 28%);  border-color: hsl(38 92% 78%); }
.dv-me-btn.sel-l { background: hsl(142 30% 90%); color: hsl(142 50% 28%); border-color: hsl(142 30% 78%); }
.dark .dv-me-btn.sel-h { background: hsl(0 60% 20%);   color: hsl(0 80% 80%); }
.dark .dv-me-btn.sel-m { background: hsl(38 60% 20%);  color: hsl(38 90% 80%); }
.dark .dv-me-btn.sel-l { background: hsl(142 40% 20%); color: hsl(142 60% 80%); }
/* 학습상태 */
.dv-me-btn.sel-wait  { background: hsl(var(--muted));  color: hsl(var(--muted-foreground)); border-color: hsl(var(--border)); }
.dv-me-btn.sel-doing { background: hsl(217 91% 92%);   color: hsl(217 91% 35%); border-color: hsl(217 91% 78%); }
.dv-me-btn.sel-done  { background: hsl(142 71% 90%);   color: hsl(142 71% 28%); border-color: hsl(142 71% 78%); }
.dark .dv-me-btn.sel-doing { background: hsl(217 60% 20%); color: hsl(217 91% 80%); }
.dark .dv-me-btn.sel-done  { background: hsl(142 40% 20%); color: hsl(142 60% 80%); }
/* 모바일 */
@media (max-width: 479px) {
  .dv-me-label { flex: 0 0 3.5rem; font-size: 0.625rem; } /* 10px */
  .dv-me-title-input { font-size: 1.25rem; }
}

/* 모바일: 헤더 버튼 그룹이 좁으면 라벨 숨김 */
@media (max-width: 639px) {
  .dv-edit-actions .btn.sm { padding: 0 0.5rem; }
}

/* 모바일: 메타 줄바꿈 자유, 본문 폭 풀, 푸터 좁게 */
@media (max-width: 639px) {
  .dv-layout > .dv-wrap {
    margin: 0;
    padding-left: 1.5rem;
    padding-right: 1.5rem;
}
  .dv-title { font-size: 1.5rem; }
  .dv-body  { font-size: 1rem; }
  .dv-foot  { gap: 0.5rem; margin-top: 2rem; }
  .dv-nav-btn { padding: 0.625rem 0.75rem; }

  /* 모바일에서는 hover가 없으니 항상 보이게 */
  .dv-go-btn { opacity: 1; top: 0.5rem;}
}

/* ══════════════════════════════════════════
   읽기 모드 토글 버튼
══════════════════════════════════════════ */
.dv-readmode-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.25rem;
  padding: 0 0.5rem;
}
.dv-readmode-btn.active {
  background: hsl(var(--primary) / 0.1);
  border-color: hsl(var(--primary) / 0.4);
  color: hsl(var(--primary));
}

/* ══════════════════════════════════════════
   읽기 모드 (body.dv-read-mode)
══════════════════════════════════════════ */
body.dv-read-mode #header {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
}
body.dv-read-mode #header.peek {
  opacity: 1;
  pointer-events: auto;
}

body.dv-read-mode #sidebar {
  transform: translateX(-100%);
  transition: transform 0.2s ease;
}
body.dv-read-mode #sidebar.peek {
  transform: translateX(0);
}

/* 편집 관련 버튼 숨김 */
body.dv-read-mode #dv-edit-btn,
body.dv-read-mode #dv-edit-actions,
body.dv-read-mode .dv-edit-actions { display: none !important; }

/* 본문 레이아웃 — 읽기 최적화
   .dv-layout이 flex이므로 block으로 해제 후 .dv-wrap에 직접 제한 적용 */
body.dv-read-mode .dv-layout {
  display: block;
  max-width: none;
  margin: 0;
}
body.dv-read-mode .dv-layout > .dv-wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}
/* TOC: 우측 fixed로 본문 중앙 정렬과 공존 */
body.dv-read-mode .dv-toc {
  position: fixed;
  right: 1.5rem;
  top: calc(var(--header-h, 56px) + 4rem);
  width: 13rem;
  max-height: calc(100vh - var(--header-h, 56px) - 6rem);
}
/* 1023px 이하: 기존 반응형 규칙에서 TOC 자동 숨김 (별도 처리 불필요) */


/* styles/modal.css */
/* ══════════════════════════════════════════
   ④ ABOUT VIEW
══════════════════════════════════════════ */
#view-about.active { display: block; }

/* ── v1.5: 휴지통 뷰 ── */
#view-trash { display: none; flex-direction: column; }
#view-trash.active { display: flex; }
.trash-toolbar {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.625rem 1rem; border-bottom: 1px solid hsl(var(--border)); flex-shrink: 0;
}
.trash-check-all { display: flex; align-items: center; gap: 0.375rem; font-size: 0.8125rem; cursor: pointer; white-space: nowrap; }
.trash-check-all input { cursor: pointer; }
.trash-search {
  flex: 1; height: 2rem; padding: 0 0.75rem; font-size: 0.875rem; font-family: inherit;
  border: 1px solid hsl(var(--border)); border-radius: calc(var(--radius) - 2px);
  background: hsl(var(--background)); color: hsl(var(--foreground)); outline: none; transition: border-color .15s;
}
.trash-search:focus { border-color: hsl(var(--primary)); }
.trash-list { flex: 1; overflow-y: auto; padding: 0.5rem 1rem; }
.trash-empty { text-align: center; padding: 3rem 1rem; color: hsl(var(--muted-foreground)); font-size: 0.875rem; }
.trash-row {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.625rem 0.5rem; border-bottom: 1px solid hsl(var(--border)); transition: background .1s;
}
.trash-row:hover { background: hsl(var(--accent)); border-radius: calc(var(--radius) - 2px); }
.trash-row-info { flex: 1; min-width: 0; }
.trash-row-title { font-size: 0.875rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.trash-row-meta { font-size: 0.75rem; color: hsl(var(--muted-foreground)); margin-top: 0.125rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.trash-row-actions { display: flex; gap: 0.375rem; flex-shrink: 0; }
.trash-cnt { background: hsl(var(--destructive)/0.15) !important; color: hsl(var(--destructive)) !important; }
.dark .trash-cnt { color: hsl(0 75% 70%) !important; }
.btn.danger { background: hsl(var(--destructive)/0.1); color: hsl(var(--destructive)); border: 1px solid hsl(var(--destructive)/0.3); }
.btn.danger:hover { background: hsl(var(--destructive)/0.2); }
.sb-item-trash svg { width: 0.9375rem; height: 0.9375rem; }

.about-wrap {
  padding: 2rem 1.5rem 4rem;
  max-width: 44rem;
}

/* 원저자 카드 */
.about-origin-card {
  background: hsl(var(--card));
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 1.5rem;
  box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.04);
}
.about-origin-head {
  padding: 1.25rem 1.25rem 1rem;
  border-bottom: 1px solid hsl(var(--border));
}
.about-origin-title {
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: -0.015em;
  color: hsl(var(--foreground));
  margin-bottom: 0.25rem;
}
.about-origin-sub {
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
}
.about-origin-body {
  padding: 1rem 1.25rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(9rem, 1fr));
  gap: 1rem 1.5rem;
}
.about-field-key {
  font-size: 0.625rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: hsl(var(--muted-foreground));
  margin-bottom: 0.25rem;
}
.about-field-val {
  font-size: 0.875rem;
  font-weight: 500;
  color: hsl(var(--foreground));
  word-break: break-all;
}
.about-field-val a {
  color: hsl(var(--info));
  text-decoration: underline;
  text-underline-offset: 3px;
}
.about-field-val a:hover { opacity: 0.8; }
.about-lock-row {
  display: flex;
  align-items: center;
  gap: 0.3125rem;
  padding: 0.625rem 1.25rem;
  background: hsl(var(--muted) / 0.5);
  border-top: 1px solid hsl(var(--border));
  font-size: 0.625rem;           /* 10px */
  color: hsl(var(--muted-foreground));
}
.about-lock-row svg { width: 0.75rem; height: 0.75rem; flex-shrink: 0; }

/* 파일 메타 카드 */
.about-meta-card {
  background: hsl(var(--card));
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1.5rem;
  box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.04);
}
.about-meta-title {
  font-size: 0.875rem;
  font-weight: 600;
  color: hsl(var(--foreground));
  margin-bottom: 1rem;
  letter-spacing: -0.01em;
}
.about-meta-actions {
  display: flex;
  gap: 0.5rem;
  margin-top: 1rem;
  justify-content: flex-end;
}

/* 링크 카드 */
.about-links-card {
  background: hsl(var(--card));
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.04);
}
.about-link-item {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.875rem 1.25rem;
  border-bottom: 1px solid hsl(var(--border));
  text-decoration: none;
  color: hsl(var(--foreground));
  transition: background-color .12s;
}
.about-link-item:last-child { border-bottom: none; }
.about-link-item:hover { background: hsl(var(--accent)); }
.about-link-icon {
  width: 2rem; height: 2rem;
  border-radius: calc(var(--radius) - 2px);
  background: hsl(var(--muted));
  color: hsl(var(--foreground));
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.about-link-icon svg { width: 1rem; height: 1rem; }
.about-link-label {
  font-size: 0.875rem;
  font-weight: 500;
  flex: 1;
}
.about-link-url {
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
}
.about-link-arrow {
  color: hsl(var(--muted-foreground));
}
.about-link-arrow svg { width: 0.875rem; height: 0.875rem; }

/* 섹션 라벨 */
.about-section-label {
  font-size: 0.625rem;           /* 10px */
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: hsl(var(--muted-foreground));
  margin-bottom: 0.625rem;
  margin-top: 0.25rem;
}

@media (max-width: 639px) {
  .about-wrap { padding: 0.75rem 0.75rem 4rem; }
  .about-origin-body { grid-template-columns: repeat(2, 1fr); }
}

/* ── About 탭 ──────────────────────────────────────── */
.about-tabs {
  display: flex;
  gap: 0.25rem;
  border-bottom: 1px solid hsl(var(--border));
  margin-bottom: 1.25rem;
}
.about-tab {
  padding: 0.375rem 0.875rem;
  font-size: 0.8125rem;
  font-weight: 500;
  color: hsl(var(--muted-foreground));
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  margin-bottom: -1px;
  transition: color 0.15s, border-color 0.15s;
}
.about-tab:hover { color: hsl(var(--foreground)); }
.about-tab.active {
  color: hsl(var(--foreground));
  border-bottom-color: hsl(var(--primary));
}

/* ── About 히스토리 탭 ─────────────────────────────── */
.about-history-card {
  background: hsl(var(--card));
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  overflow: hidden;
}
.about-history-empty {
  padding: 1rem;
  font-size: 0.8125rem;
  color: hsl(var(--muted-foreground));
  text-align: center;
}
.about-history-more {
  padding: 0.5rem 1rem;
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
  border-top: 1px solid hsl(var(--border));
}
.about-editor-row {
  padding: 0.625rem 1rem;
  border-bottom: 1px solid hsl(var(--border));
  display: flex;
  flex-direction: column;
  gap: 0.15rem;
}
.about-editor-row:last-child { border-bottom: none; }
.about-editor-name {
  font-size: 0.875rem;
  font-weight: 500;
  color: hsl(var(--foreground));
}
.about-editor-email {
  font-size: 0.75rem;
  font-weight: 400;
  color: hsl(var(--muted-foreground));
}
.about-editor-meta {
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
}
.about-log-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.4rem 1rem;
  border-bottom: 1px solid hsl(var(--border));
  font-size: 0.8125rem;
}
.about-log-row:last-child { border-bottom: none; }
.about-log-time {
  color: hsl(var(--muted-foreground));
  font-size: 0.75rem;
  flex-shrink: 0;
}
.about-log-editor {
  color: hsl(var(--foreground));
  font-weight: 500;
}

/* ── About 히스토리 2컬럼 레이아웃 ─────────────────── */
.about-wrap.wide { max-width: 56rem; }

.about-history-layout {
  display: grid;
  grid-template-columns: 11rem 1fr;
  gap: 0;
  border: 1px solid hsl(var(--border));
  border-radius: var(--radius);
  overflow: hidden;
  min-height: 20rem;
}

.about-editor-list {
  border-right: 1px solid hsl(var(--border));
  background: hsl(var(--muted) / 0.3);
  overflow-y: auto;
}

.about-editor-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.6rem 0.875rem;
  font-size: 0.8125rem;
  font-weight: 500;
  color: hsl(var(--muted-foreground));
  cursor: pointer;
  border-bottom: 1px solid hsl(var(--border));
  transition: background 0.12s, color 0.12s;
  user-select: none;
}
.about-editor-item:last-child { border-bottom: none; }
.about-editor-item:hover { background: hsl(var(--accent)); color: hsl(var(--foreground)); }
.about-editor-item.active {
  background: hsl(var(--background));
  color: hsl(var(--foreground));
  font-weight: 600;
}

.about-editor-item-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: hsl(var(--primary));
  flex-shrink: 0;
  opacity: 0;
}
.about-editor-item.active .about-editor-item-dot { opacity: 1; }

.about-editor-item-origin-badge {
  font-size: 0.6rem;
  color: hsl(var(--muted-foreground));
  font-weight: 400;
}

.about-editor-detail {
  overflow-y: auto;
  background: hsl(var(--background));
}

.about-detail-header {
  padding: 0.875rem 1rem;
  border-bottom: 1px solid hsl(var(--border));
}

.about-detail-name {
  font-size: 0.9375rem;
  font-weight: 600;
  color: hsl(var(--foreground));
  margin-bottom: 0.15rem;
}

.about-detail-meta {
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
}

.about-detail-section {
  padding: 0.5rem 1rem 0;
}

.about-detail-section-label {
  font-size: 0.625rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: hsl(var(--muted-foreground));
  padding: 0.5rem 0 0.25rem;
  border-bottom: 1px solid hsl(var(--border) / 0.5);
  margin-bottom: 0.25rem;
}

.about-detail-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.35rem 0;
  font-size: 0.8rem;
  border-bottom: 1px solid hsl(var(--border) / 0.4);
}
.about-detail-row:last-child { border-bottom: none; }

.about-detail-time {
  color: hsl(var(--muted-foreground));
  font-size: 0.72rem;
  flex-shrink: 0;
  min-width: 7.5rem;
}

.about-detail-content {
  color: hsl(var(--foreground));
  font-weight: 500;
}

.about-act-badge {
  display: inline-block;
  padding: 0.1rem 0.35rem;
  border-radius: 3px;
  font-size: 0.68rem;
  font-weight: 600;
  flex-shrink: 0;
}
.about-act-badge.create { background: hsl(142 71% 92%); color: hsl(142 50% 28%); }
.about-act-badge.update { background: hsl(217 91% 92%); color: hsl(217 60% 35%); }
.about-act-badge.delete { background: hsl(0 84% 93%);   color: hsl(0 65% 38%); }
.dark .about-act-badge.create { background: hsl(142 40% 18%); color: hsl(142 60% 72%); }
.dark .about-act-badge.update { background: hsl(217 50% 20%); color: hsl(217 80% 75%); }
.dark .about-act-badge.delete { background: hsl(0 45% 20%);   color: hsl(0 75% 75%); }
.about-act-badge.restore { background: hsl(262 83% 93%); color: hsl(262 60% 38%); }
.dark .about-act-badge.restore { background: hsl(262 40% 20%); color: hsl(262 70% 75%); }

@media (max-width: 600px) {
  .about-history-layout {
    grid-template-columns: 1fr;
  }
  .about-editor-list {
    border-right: none;
    border-bottom: 1px solid hsl(var(--border));
    max-height: 8rem;
    overflow-x: auto;
    overflow-y: hidden;
    display: flex;
    flex-direction: row;
  }
  .about-editor-item {
    flex-shrink: 0;
    border-bottom: none;
    border-right: 1px solid hsl(var(--border));
  }
}

/* ══════════════════════════════════════════
   DIALOG / MODAL (shadcn Dialog)
   z-index 정책: 헤더(50) < 사이드바(30/모바일51) < 모달(200) < 토스트(300)
   모달은 모바일 사이드바(51)보다 높아야 하므로 200으로 상향
══════════════════════════════════════════ */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: hsl(0 0% 0% / 0.5);
  z-index: 200;
  align-items: center; justify-content: center;
  padding: 1rem;
}
.overlay.open { display: flex; animation: overlay-in .15s ease; }
@keyframes overlay-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.modal {
  background: hsl(var(--background));
